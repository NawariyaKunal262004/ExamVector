<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">ExamVector Scaling Architecture</text>
  <text x="400" y="70" font-family="Arial" font-size="16" text-anchor="middle">Redis Caching and NGINX Load Balancing</text>
  
  <!-- Client Layer -->
  <rect x="300" y="100" width="200" height="60" rx="10" ry="10" fill="#e9ecef" stroke="#495057" stroke-width="2" />
  <text x="400" y="135" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Clients</text>
  <text x="400" y="155" font-family="Arial" font-size="12" text-anchor="middle">(Web Browsers, Mobile Apps)</text>
  
  <!-- Arrows from Clients to NGINX -->
  <path d="M400 160 L400 190" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- NGINX Load Balancer -->
  <rect x="250" y="190" width="300" height="70" rx="10" ry="10" fill="#4dabf7" stroke="#1864ab" stroke-width="2" />
  <text x="400" y="225" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="white">NGINX Load Balancer</text>
  <text x="400" y="245" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Rate Limiting, SSL Termination, Health Checks</text>
  
  <!-- Arrows from NGINX to API Servers -->
  <path d="M300 260 L200 300" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M400 260 L400 300" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M500 260 L600 300" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- API Servers -->
  <rect x="100" y="300" width="150" height="60" rx="10" ry="10" fill="#51cf66" stroke="#2b8a3e" stroke-width="2" />
  <text x="175" y="335" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="white">API Server 1</text>
  
  <rect x="325" y="300" width="150" height="60" rx="10" ry="10" fill="#51cf66" stroke="#2b8a3e" stroke-width="2" />
  <text x="400" y="335" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="white">API Server 2</text>
  
  <rect x="550" y="300" width="150" height="60" rx="10" ry="10" fill="#51cf66" stroke="#2b8a3e" stroke-width="2" />
  <text x="625" y="335" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="white">API Server 3</text>
  
  <!-- Redis Cache -->
  <rect x="300" y="400" width="200" height="70" rx="10" ry="10" fill="#f06595" stroke="#a61e4d" stroke-width="2" />
  <text x="400" y="435" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="white">Redis Cache</text>
  <text x="400" y="455" font-family="Arial" font-size="12" text-anchor="middle" fill="white">High-Performance Caching Layer</text>
  
  <!-- Arrows between API Servers and Redis -->
  <path d="M175 360 L350 400" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M400 360 L400 400" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M625 360 L450 400" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Database -->
  <rect x="300" y="500" width="200" height="60" rx="10" ry="10" fill="#868e96" stroke="#343a40" stroke-width="2" />
  <text x="400" y="535" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="white">Database</text>
  
  <!-- Arrow from Redis to Database -->
  <path d="M400 470 L400 500" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />
  <text x="420" y="485" font-family="Arial" font-size="12">Cache Miss</text>
  
  <!-- Legend -->
  <rect x="650" y="500" width="120" height="80" fill="white" stroke="#495057" stroke-width="1" />
  <text x="710" y="520" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Legend</text>
  
  <rect x="660" y="530" width="15" height="15" fill="#4dabf7" />
  <text x="685" y="543" font-family="Arial" font-size="12" text-anchor="start">Load Balancer</text>
  
  <rect x="660" y="550" width="15" height="15" fill="#51cf66" />
  <text x="685" y="563" font-family="Arial" font-size="12" text-anchor="start">API Servers</text>
  
  <rect x="660" y="570" width="15" height="15" fill="#f06595" />
  <text x="685" y="583" font-family="Arial" font-size="12" text-anchor="start">Redis Cache</text>
  
  <!-- Arrowhead marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057" />
    </marker>
  </defs>
</svg>